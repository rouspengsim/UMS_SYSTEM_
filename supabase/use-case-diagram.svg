  <rect width="1600" height="960" class="background" />
  <text x="800" y="46" class="title">StudentSphere Use Case Diagram</text>
  <text x="800" y="74" class="subtitle">Clean UML-style diagram with actors and oval use cases.</text>
  
  <g>
    
    <g>
      <rect x="45" y="405" width="220" height="104" rx="18" class="role-card role-admin" />
      <circle cx="91" cy="457" r="26" class="role-avatar role-avatar-admin" />
      <text x="91" y="464" class="role-initials">AD</text>
      <text x="131" y="447" class="role-title">Admin</text>
      <text x="131" y="466" class="role-note">school setup and</text>
<text x="131" y="480" class="role-note">control</text>
    </g>
    
    <g>
