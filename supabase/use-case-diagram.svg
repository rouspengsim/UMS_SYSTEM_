    <path d="M 322 295 L 362 295" class="association" />
    <path d="M 322 370 L 362 370" class="association" />
    <path d="M 322 445 L 362 445" class="association" />
    <path d="M 322 520 L 362 520" class="association" />
    <path d="M 322 595 L 362 595" class="association" />
    <path d="M 322 670 L 362 670" class="association" />
    <path d="M 322 745 L 362 745" class="association" />

    <path d="M 578 445 L 692 315" class="association" />
    <path d="M 578 595 L 692 405" class="association" />
    <path d="M 578 670 L 692 675" class="association" />

    <path d="M 1335 307 H 1275 M 1275 295 V 455" class="spine" />
    <path d="M 1275 295 L 1232 295" class="association" />
    <path d="M 1275 375 L 1232 375" class="association" />
    <path d="M 1275 455 L 1232 455" class="association" />

    <path d="M 1335 627 H 1275 M 1275 570 V 730" class="spine" />
    <path d="M 1275 570 L 1232 570" class="association" />
