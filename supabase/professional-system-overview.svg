<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">StudentSphere Professional System Overview</title>
  <desc id="desc">Clean presentation diagram showing users, application modules, database records, and the main workflow.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#334155" />
    </marker>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <style>
      .background { fill: #f8fafc; }
      .page-title { fill: #0f172a; font: 800 34px Arial, sans-serif; text-anchor: middle; }
      .page-subtitle { fill: #64748b; font: 500 16px Arial, sans-serif; text-anchor: middle; }
      .section-title { fill: #0f172a; font: 800 21px Arial, sans-serif; }
      .section-note { fill: #64748b; font: 500 14px Arial, sans-serif; }
      .panel { fill: #ffffff; stroke: #dbe4ee; stroke-width: 1.4; filter: url(#softShadow); }
      .platform-panel { fill: #ffffff; stroke: #b6d9e2; stroke-width: 1.5; filter: url(#softShadow); }
      .data-panel { fill: #ffffff; stroke: #d6d3d1; stroke-width: 1.5; filter: url(#softShadow); }
      .actor-card, .module-card, .data-pill, .process-node, .store { fill: #ffffff; stroke: #d7e0ea; stroke-width: 1.2; }
      .initials { fill: #ffffff; font: 800 17px Arial, sans-serif; text-anchor: middle; }
      .actor-title { fill: #0f172a; font: 800 17px Arial, sans-serif; }
      .actor-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .module-title { fill: #0f172a; font: 800 16px Arial, sans-serif; }
      .module-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .data-title { fill: #0f172a; font: 800 14px Arial, sans-serif; }
      .data-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .flow { fill: none; stroke: #334155; stroke-width: 2.2; stroke-linecap: round; }
      .flow-soft { fill: none; stroke: #0f766e; stroke-width: 2.4; stroke-linecap: round; }
      .flow-dashed { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; stroke-linecap: round; }
      .flow-label { fill: #0f172a; font: 700 12px Arial, sans-serif; text-anchor: middle; paint-order: stroke; stroke: #f8fafc; stroke-width: 5px; stroke-linejoin: round; }
      .process-id { fill: #ffffff; font: 800 14px Arial, sans-serif; text-anchor: middle; }
      .process-title { fill: #0f172a; font: 800 15px Arial, sans-serif; }
      .process-kind { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .db-icon { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.5; }
      .store-title { fill: #0f172a; font: 800 14px Arial, sans-serif; }
      .store-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .step-circle { fill: #0f766e; }
      .step-number { fill: #ffffff; font: 800 17px Arial, sans-serif; text-anchor: middle; }
      .step-title { fill: #0f172a; font: 800 14px Arial, sans-serif; }
      .step-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .swimlane-label { fill: #475569; font: 800 13px Arial, sans-serif; letter-spacing: 1.5px; }
    </style>
  </defs>
  <rect width="1600" height="980" class="background" />
  <text x="800" y="48" class="page-title">StudentSphere Professional System Overview</text>
  <text x="800" y="78" class="page-subtitle">Clean presentation diagram showing users, application modules, database records, and the main workflow.</text>
  
  <g>
    <rect x="70" y="130" width="1460" height="680" rx="30" class="panel" />

    <text x="120" y="188" class="section-title">1. Users</text>
    <text x="120" y="214" class="section-note">People who use the system</text>
    
    <g>
      <rect x="110" y="255" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="152" cy="310" r="25" fill="#2563eb" />
      <text x="152" y="317" class="initials">AD</text>
      <text x="194" y="301" class="actor-title">Admin</text>
      <text x="194" y="319.5" class="actor-note">Controls setup,</text>
<text x="194" y="334.5" class="actor-note">users, reports</text>
    </g>
    
    <g>
      <rect x="110" y="390" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="152" cy="445" r="25" fill="#0f766e" />
      <text x="152" y="452" class="initials">TR</text>
      <text x="194" y="436" class="actor-title">Teacher</text>
      <text x="194" y="454.5" class="actor-note">Attendance, scores,</text>
<text x="194" y="469.5" class="actor-note">schedule</text>
    </g>
    
    <g>
      <rect x="110" y="525" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="152" cy="580" r="25" fill="#db2777" />
      <text x="152" y="587" class="initials">ST</text>
      <text x="194" y="571" class="actor-title">Student</text>
      <text x="194" y="589.5" class="actor-note">Profile, results,</text>
<text x="194" y="604.5" class="actor-note">payments</text>
    </g>
    
    <g>
      <rect x="110" y="660" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="152" cy="715" r="25" fill="#d97706" />
      <text x="152" y="722" class="initials">AC</text>
      <text x="194" y="706" class="actor-title">Accounting</text>
      <text x="194" y="724.5" class="actor-note">Fees, payments,</text>
<text x="194" y="739.5" class="actor-note">receipts</text>
    </g>

    <rect x="430" y="175" width="520" height="575" rx="28" class="platform-panel" />
    <text x="480" y="230" class="section-title">2. StudentSphere App</text>
    <text x="480" y="256" class="section-note">Core modules used every day</text>
    
    <g>
      <rect x="480" y="300" width="285" height="88" rx="16" class="module-card" />
      <rect x="480" y="300" width="7" height="88" rx="3.5" fill="#2563eb" />
      <text x="504" y="335" class="module-title">Authentication</text>
      <text x="504" y="360" class="module-note">Login, roles, permissions</text>
    </g>
    
    <g>
      <rect x="480" y="410" width="285" height="88" rx="16" class="module-card" />
      <rect x="480" y="410" width="7" height="88" rx="3.5" fill="#7c3aed" />
      <text x="504" y="445" class="module-title">Academic Management</text>
      <text x="504" y="470" class="module-note">Students, teachers, classes</text>
    </g>
    
    <g>
      <rect x="480" y="520" width="285" height="88" rx="16" class="module-card" />
      <rect x="480" y="520" width="7" height="88" rx="3.5" fill="#0891b2" />
      <text x="504" y="555" class="module-title">Learning Records</text>
      <text x="504" y="580" class="module-note">Attendance, scores, timetable</text>
    </g>
    
    <g>
      <rect x="480" y="630" width="285" height="88" rx="16" class="module-card" />
      <rect x="480" y="630" width="7" height="88" rx="3.5" fill="#d97706" />
      <text x="504" y="665" class="module-title">Finance and Reports</text>
      <text x="504" y="690" class="module-note">Payments, summaries, exports</text>
    </g>

    <rect x="1060" y="175" width="390" height="575" rx="28" class="data-panel" />
    <text x="1110" y="230" class="section-title">3. Supabase Data</text>
    <text x="1110" y="256" class="section-note">Records saved by each module</text>
    
    <g>
      <rect x="1095" y="300" width="345" height="62" rx="15" class="data-pill" />
      <circle cx="1125" cy="331" r="10" fill="#2563eb" />
      <text x="1150" y="327" class="data-title">Users and Profiles</text>
      <text x="1150" y="346" class="data-note">accounts, roles, access</text>
    </g>
    
    <g>
      <rect x="1095" y="390" width="345" height="62" rx="15" class="data-pill" />
      <circle cx="1125" cy="421" r="10" fill="#7c3aed" />
      <text x="1150" y="417" class="data-title">School Records</text>
      <text x="1150" y="436" class="data-note">students, teachers, classes</text>
    </g>
    
    <g>
      <rect x="1095" y="480" width="345" height="62" rx="15" class="data-pill" />
      <circle cx="1125" cy="511" r="10" fill="#0891b2" />
      <text x="1150" y="507" class="data-title">Academic Activity</text>
      <text x="1150" y="526" class="data-note">attendance, scores, schedules</text>
    </g>
    
    <g>
      <rect x="1095" y="570" width="345" height="62" rx="15" class="data-pill" />
      <circle cx="1125" cy="601" r="10" fill="#d97706" />
      <text x="1150" y="597" class="data-title">Payments and Notices</text>
      <text x="1150" y="616" class="data-note">fees, reports, notifications</text>
    </g>

    
    <g>
      <path d="M 350 470 C 370 470, 410 470, 430 470" class="flow" marker-end="url(#arrow)" />
      <text x="390" y="461" class="flow-label">use system</text>
    </g>
    
    <g>
      <path d="M 950 470 C 970 470, 1040 470, 1060 470" class="flow-soft" marker-end="url(#arrow)" />
      <text x="1005" y="461" class="flow-label">save data</text>
    </g>
    
    <g>
      <path d="M 1060 545 C 1080 545, 930 545, 950 545" class="flow-dashed" marker-end="url(#arrow)" />
      <text x="1005" y="536" class="flow-label">load records</text>
    </g>

    <rect x="70" y="850" width="1460" height="90" rx="24" class="panel" />
    <text x="125" y="904" class="section-title">Simple flow:</text>
    <text x="285" y="904" class="section-note" style="font-size: 18px;">Login -> Choose module -> Add or update data -> Save to Supabase -> View report</text>
  </g>
</svg>
