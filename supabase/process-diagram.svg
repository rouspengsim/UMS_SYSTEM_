<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">StudentSphere System Process</title>
  <desc id="desc">Modern overview of users, application modules, database tables, and the simple process flow.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#334155" />
    </marker>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <style>
      .background { fill: #f8fafc; }
      .page-title { fill: #0f172a; font: 800 34px Arial, sans-serif; text-anchor: middle; }
      .page-subtitle { fill: #64748b; font: 500 16px Arial, sans-serif; text-anchor: middle; }
      .section-title { fill: #0f172a; font: 800 21px Arial, sans-serif; }
      .section-note { fill: #64748b; font: 500 14px Arial, sans-serif; }
      .panel { fill: #ffffff; stroke: #dbe4ee; stroke-width: 1.4; filter: url(#softShadow); }
      .platform-panel { fill: #ffffff; stroke: #b6d9e2; stroke-width: 1.5; filter: url(#softShadow); }
      .data-panel { fill: #ffffff; stroke: #d6d3d1; stroke-width: 1.5; filter: url(#softShadow); }
      .actor-card, .module-card, .data-pill, .process-node, .store { fill: #ffffff; stroke: #d7e0ea; stroke-width: 1.2; }
      .initials { fill: #ffffff; font: 800 17px Arial, sans-serif; text-anchor: middle; }
      .actor-title { fill: #0f172a; font: 800 17px Arial, sans-serif; }
      .actor-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .module-title { fill: #0f172a; font: 800 16px Arial, sans-serif; }
      .module-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .data-title { fill: #0f172a; font: 800 14px Arial, sans-serif; }
      .data-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .flow { fill: none; stroke: #334155; stroke-width: 2.2; stroke-linecap: round; }
      .flow-soft { fill: none; stroke: #0f766e; stroke-width: 2.4; stroke-linecap: round; }
      .flow-dashed { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; stroke-linecap: round; }
      .flow-label { fill: #0f172a; font: 700 12px Arial, sans-serif; text-anchor: middle; paint-order: stroke; stroke: #f8fafc; stroke-width: 5px; stroke-linejoin: round; }
      .process-id { fill: #ffffff; font: 800 14px Arial, sans-serif; text-anchor: middle; }
      .process-title { fill: #0f172a; font: 800 15px Arial, sans-serif; }
      .process-kind { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .db-icon { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.5; }
      .store-title { fill: #0f172a; font: 800 14px Arial, sans-serif; }
      .store-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .step-circle { fill: #0f766e; }
      .step-number { fill: #ffffff; font: 800 17px Arial, sans-serif; text-anchor: middle; }
      .step-title { fill: #0f172a; font: 800 14px Arial, sans-serif; }
      .step-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .swimlane-label { fill: #475569; font: 800 13px Arial, sans-serif; letter-spacing: 1.5px; }
    </style>
  </defs>
  <rect width="1600" height="1000" class="background" />
  <text x="800" y="48" class="page-title">StudentSphere System Process</text>
  <text x="800" y="78" class="page-subtitle">Modern overview of users, application modules, database tables, and the simple process flow.</text>
  
  <g>
    <rect x="48" y="120" width="270" height="665" rx="28" class="panel" />
    <text x="78" y="166" class="section-title">People</text>
    <text x="78" y="190" class="section-note">Who uses the system</text>
    
    <g>
      <rect x="68" y="230" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="110" cy="285" r="25" fill="#2563eb" />
      <text x="110" y="292" class="initials">AD</text>
      <text x="152" y="276" class="actor-title">Admin</text>
      <text x="152" y="287" class="actor-note">Setup users,</text>
<text x="152" y="302" class="actor-note">classes, teachers,</text>
<text x="152" y="317" class="actor-note">and reports</text>
    </g>
    
    <g>
      <rect x="68" y="365" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="110" cy="420" r="25" fill="#0f766e" />
      <text x="110" y="427" class="initials">TR</text>
      <text x="152" y="411" class="actor-title">Teacher</text>
      <text x="152" y="422" class="actor-note">Take attendance, add</text>
<text x="152" y="437" class="actor-note">scores, view</text>
<text x="152" y="452" class="actor-note">schedule</text>
    </g>
    
    <g>
      <rect x="68" y="500" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="110" cy="555" r="25" fill="#db2777" />
      <text x="110" y="562" class="initials">ST</text>
      <text x="152" y="546" class="actor-title">Student</text>
      <text x="152" y="557" class="actor-note">View profile,</text>
<text x="152" y="572" class="actor-note">timetable, payments,</text>
<text x="152" y="587" class="actor-note">results</text>
    </g>
    
    <g>
      <rect x="68" y="635" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="110" cy="690" r="25" fill="#d97706" />
      <text x="110" y="697" class="initials">AC</text>
      <text x="152" y="681" class="actor-title">Accounting</text>
      <text x="152" y="699.5" class="actor-note">Update payments and</text>
<text x="152" y="714.5" class="actor-note">payment reports</text>
    </g>

    <rect x="380" y="120" width="680" height="665" rx="30" class="platform-panel" />
    <text x="420" y="166" class="section-title">StudentSphere Platform</text>
    <text x="420" y="190" class="section-note">Main application processes grouped by work area</text>
    
    <g>
      <rect x="420" y="230" width="285" height="88" rx="16" class="module-card" />
      <rect x="420" y="230" width="7" height="88" rx="3.5" fill="#2563eb" />
      <text x="444" y="265" class="module-title">Login and Roles</text>
      <text x="444" y="283" class="module-note">Sign in, permissions,</text>
<text x="444" y="297" class="module-note">dashboards</text>
    </g>
    
    <g>
      <rect x="735" y="230" width="285" height="88" rx="16" class="module-card" />
      <rect x="735" y="230" width="7" height="88" rx="3.5" fill="#db2777" />
      <text x="759" y="265" class="module-title">Student Records</text>
      <text x="759" y="283" class="module-note">Register, edit, class</text>
<text x="759" y="297" class="module-note">assignment</text>
    </g>
    
    <g>
      <rect x="420" y="345" width="285" height="88" rx="16" class="module-card" />
      <rect x="420" y="345" width="7" height="88" rx="3.5" fill="#7c3aed" />
      <text x="444" y="380" class="module-title">Teachers and Classes</text>
      <text x="444" y="405" class="module-note">Teachers, classrooms, subjects</text>
    </g>
    
    <g>
      <rect x="735" y="345" width="285" height="88" rx="16" class="module-card" />
      <rect x="735" y="345" width="7" height="88" rx="3.5" fill="#0f766e" />
      <text x="759" y="380" class="module-title">Timetable</text>
      <text x="759" y="398" class="module-note">Class schedule and teacher</text>
<text x="759" y="412" class="module-note">schedule</text>
    </g>
    
    <g>
      <rect x="420" y="460" width="285" height="88" rx="16" class="module-card" />
      <rect x="420" y="460" width="7" height="88" rx="3.5" fill="#0891b2" />
      <text x="444" y="495" class="module-title">Attendance and Scores</text>
      <text x="444" y="513" class="module-note">Daily attendance, exams,</text>
<text x="444" y="527" class="module-note">results</text>
    </g>
    
    <g>
      <rect x="735" y="460" width="285" height="88" rx="16" class="module-card" />
      <rect x="735" y="460" width="7" height="88" rx="3.5" fill="#d97706" />
      <text x="759" y="495" class="module-title">Payments</text>
      <text x="759" y="513" class="module-note">Student fees and payment</text>
<text x="759" y="527" class="module-note">status</text>
    </g>
    
    <g>
      <rect x="420" y="575" width="285" height="88" rx="16" class="module-card" />
      <rect x="420" y="575" width="7" height="88" rx="3.5" fill="#475569" />
      <text x="444" y="610" class="module-title">Reports</text>
      <text x="444" y="628" class="module-note">Student, teacher, payment,</text>
<text x="444" y="642" class="module-note">schedule reports</text>
    </g>
    
    <g>
      <rect x="735" y="575" width="285" height="88" rx="16" class="module-card" />
      <rect x="735" y="575" width="7" height="88" rx="3.5" fill="#ea580c" />
      <text x="759" y="610" class="module-title">Notifications</text>
      <text x="759" y="635" class="module-note">Announcements and reminders</text>
    </g>

    <rect x="1120" y="120" width="430" height="665" rx="28" class="data-panel" />
    <text x="1160" y="166" class="section-title">Database</text>
    <text x="1160" y="190" class="section-note">Supabase tables used by the app</text>
    
    <g>
      <rect x="1160" y="225" width="345" height="62" rx="15" class="data-pill" />
      <circle cx="1190" cy="256" r="10" fill="#2563eb" />
      <text x="1215" y="252" class="data-title">Auth and Profiles</text>
      <text x="1215" y="271" class="data-note">users, profiles, roles</text>
    </g>
    
    <g>
      <rect x="1160" y="305" width="345" height="62" rx="15" class="data-pill" />
      <circle cx="1190" cy="336" r="10" fill="#db2777" />
      <text x="1215" y="332" class="data-title">Students</text>
      <text x="1215" y="351" class="data-note">student records and enrollment</text>
    </g>
    
    <g>
      <rect x="1160" y="385" width="345" height="62" rx="15" class="data-pill" />
      <circle cx="1190" cy="416" r="10" fill="#7c3aed" />
      <text x="1215" y="412" class="data-title">Teachers and Classes</text>
      <text x="1215" y="431" class="data-note">teachers, classrooms, subjects</text>
    </g>
    
    <g>
      <rect x="1160" y="465" width="345" height="62" rx="15" class="data-pill" />
      <circle cx="1190" cy="496" r="10" fill="#0891b2" />
      <text x="1215" y="492" class="data-title">Attendance and Scores</text>
      <text x="1215" y="511" class="data-note">attendance, grades, results</text>
    </g>
    
    <g>
      <rect x="1160" y="545" width="345" height="62" rx="15" class="data-pill" />
      <circle cx="1190" cy="576" r="10" fill="#d97706" />
      <text x="1215" y="572" class="data-title">Payments</text>
      <text x="1215" y="591" class="data-note">invoices, fees, pay status</text>
    </g>
    
    <g>
      <rect x="1160" y="625" width="345" height="62" rx="15" class="data-pill" />
      <circle cx="1190" cy="656" r="10" fill="#ea580c" />
      <text x="1215" y="652" class="data-title">Notifications</text>
      <text x="1215" y="671" class="data-note">messages and reminders</text>
    </g>

    
    <g>
      <path d="M 318 455 C 336 455, 362 455, 380 455" class="flow" marker-end="url(#arrow)" />
      <text x="349" y="446" class="flow-label">actions</text>
    </g>
    
    <g>
      <path d="M 1060 450 L 1120 450" class="flow-soft" marker-end="url(#arrow)" />
      <text x="1090" y="441" class="flow-label">read/write</text>
    </g>
    
    <g>
      <path d="M 1120 530 L 1060 530" class="flow-dashed" marker-end="url(#arrow)" />
      <text x="1090" y="521" class="flow-label">records</text>
    </g>

    <rect x="48" y="830" width="1502" height="130" rx="28" class="panel" />
    <text x="78" y="874" class="section-title">Simple Process</text>
    
    <g>
      <circle cx="103" cy="924" r="22" class="step-circle" />
      <text x="103" y="931" class="step-number">1</text>
      <text x="140" y="920" class="step-title">Login</text>
      <text x="140" y="938" class="step-note">User signs in and role is</text>
<text x="140" y="952" class="step-note">checked</text>
    </g>
    
    <g>
      <circle cx="375" cy="924" r="22" class="step-circle" />
      <text x="375" y="931" class="step-number">2</text>
      <text x="412" y="920" class="step-title">Choose Module</text>
      <text x="412" y="938" class="step-note">Open students, classes,</text>
<text x="412" y="952" class="step-note">attendance, or payments</text>
    </g>
    
    <g>
      <circle cx="675" cy="924" r="22" class="step-circle" />
      <text x="675" y="931" class="step-number">3</text>
      <text x="712" y="920" class="step-title">Update Data</text>
      <text x="712" y="938" class="step-note">Add or edit records</text>
<text x="712" y="952" class="step-note">inside the app</text>
    </g>
    
    <g>
      <circle cx="975" cy="924" r="22" class="step-circle" />
      <text x="975" y="931" class="step-number">4</text>
      <text x="1012" y="920" class="step-title">Save to Supabase</text>
      <text x="1012" y="938" class="step-note">Tables store the latest</text>
<text x="1012" y="952" class="step-note">information</text>
    </g>
    
    <g>
      <circle cx="1265" cy="924" r="22" class="step-circle" />
      <text x="1265" y="931" class="step-number">5</text>
      <text x="1302" y="920" class="step-title">Report</text>
      <text x="1302" y="938" class="step-note">Users view reports,</text>
<text x="1302" y="952" class="step-note">schedules, and results</text>
    </g>
  </g>
</svg>
