<svg xmlns="http://www.w3.org/2000/svg" width="560" height="888" viewBox="0 0 560 888" role="img" aria-labelledby="title desc">
  <title id="title">students table</title>
  <desc id="desc">Columns and keys for the students database table.</desc>
  <defs>
    <style>

      .background { fill: #f8fafc; }
