<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">StudentSphere Context Diagram</title>
  <desc id="desc">Modern context diagram showing how external users interact with the system.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#334155" />
    </marker>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
    <style>
      .background { fill: #f8fafc; }
      .page-title { fill: #0f172a; font: 800 34px Arial, sans-serif; text-anchor: middle; }
      .page-subtitle { fill: #64748b; font: 500 16px Arial, sans-serif; text-anchor: middle; }
      .section-title { fill: #0f172a; font: 800 21px Arial, sans-serif; }
      .section-note { fill: #64748b; font: 500 14px Arial, sans-serif; }
      .panel { fill: #ffffff; stroke: #dbe4ee; stroke-width: 1.4; filter: url(#softShadow); }
      .platform-panel { fill: #ffffff; stroke: #b6d9e2; stroke-width: 1.5; filter: url(#softShadow); }
      .data-panel { fill: #ffffff; stroke: #d6d3d1; stroke-width: 1.5; filter: url(#softShadow); }
      .actor-card, .module-card, .data-pill, .process-node, .store { fill: #ffffff; stroke: #d7e0ea; stroke-width: 1.2; }
      .initials { fill: #ffffff; font: 800 17px Arial, sans-serif; text-anchor: middle; }
      .actor-title { fill: #0f172a; font: 800 17px Arial, sans-serif; }
      .actor-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .module-title { fill: #0f172a; font: 800 16px Arial, sans-serif; }
      .module-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .data-title { fill: #0f172a; font: 800 14px Arial, sans-serif; }
      .data-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .flow { fill: none; stroke: #334155; stroke-width: 2.2; stroke-linecap: round; }
      .flow-soft { fill: none; stroke: #0f766e; stroke-width: 2.4; stroke-linecap: round; }
      .flow-dashed { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 7; stroke-linecap: round; }
      .flow-label { fill: #0f172a; font: 700 12px Arial, sans-serif; text-anchor: middle; paint-order: stroke; stroke: #f8fafc; stroke-width: 5px; stroke-linejoin: round; }
      .process-id { fill: #ffffff; font: 800 14px Arial, sans-serif; text-anchor: middle; }
      .process-title { fill: #0f172a; font: 800 15px Arial, sans-serif; }
      .process-kind { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .db-icon { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.5; }
      .store-title { fill: #0f172a; font: 800 14px Arial, sans-serif; }
      .store-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .step-circle { fill: #0f766e; }
      .step-number { fill: #ffffff; font: 800 17px Arial, sans-serif; text-anchor: middle; }
      .step-title { fill: #0f172a; font: 800 14px Arial, sans-serif; }
      .step-note { fill: #64748b; font: 500 12px Arial, sans-serif; }
      .swimlane-label { fill: #475569; font: 800 13px Arial, sans-serif; letter-spacing: 1.5px; }
    </style>
  </defs>
  <rect width="1400" height="720" class="background" />
  <text x="700" y="48" class="page-title">StudentSphere Context Diagram</text>
  <text x="700" y="78" class="page-subtitle">Modern context diagram showing how external users interact with the system.</text>
  
  <g>
    <rect x="70" y="125" width="1260" height="520" rx="32" class="panel" />
    <text x="110" y="176" class="section-title">Context Diagram</text>
    <text x="110" y="202" class="section-note">External users send work into StudentSphere and receive reports back.</text>

    
    <g>
      <rect x="110" y="260" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="152" cy="315" r="25" fill="#2563eb" />
      <text x="152" y="322" class="initials">AD</text>
      <text x="194" y="306" class="actor-title">Admin</text>
      <text x="194" y="324.5" class="actor-note">Manage school setup</text>
<text x="194" y="339.5" class="actor-note">and reports</text>
    </g>
    
    <g>
      <rect x="110" y="430" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="152" cy="485" r="25" fill="#d97706" />
      <text x="152" y="492" class="initials">AC</text>
      <text x="194" y="476" class="actor-title">Accounting</text>
      <text x="194" y="494.5" class="actor-note">Payment updates and</text>
<text x="194" y="509.5" class="actor-note">payment reports</text>
    </g>

    <rect x="525" y="300" width="350" height="185" rx="34" class="platform-panel" />
    <text x="700" y="365" class="page-title" style="font-size: 28px;">StudentSphere</text>
    <text x="700" y="400" class="page-subtitle">Student Management System</text>
    <text x="700" y="432" class="page-subtitle">students, classes, payments, reports</text>

    
    <g>
      <rect x="1050" y="220" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="1092" cy="275" r="25" fill="#0f766e" />
      <text x="1092" y="282" class="initials">TR</text>
      <text x="1134" y="266" class="actor-title">Teacher</text>
      <text x="1134" y="284.5" class="actor-note">Attendance, scores,</text>
<text x="1134" y="299.5" class="actor-note">schedules</text>
    </g>
    
    <g>
      <rect x="1050" y="375" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="1092" cy="430" r="25" fill="#db2777" />
      <text x="1092" y="437" class="initials">ST</text>
      <text x="1134" y="421" class="actor-title">Student</text>
      <text x="1134" y="439.5" class="actor-note">Timetable, payment,</text>
<text x="1134" y="454.5" class="actor-note">results</text>
    </g>
    
    <g>
      <rect x="1050" y="530" width="240" height="110" rx="20" class="actor-card" />
      <circle cx="1092" cy="585" r="25" fill="#7c3aed" />
      <text x="1092" y="592" class="initials">RG</text>
      <text x="1134" y="576" class="actor-title">Register</text>
      <text x="1134" y="594.5" class="actor-note">Add new student</text>
<text x="1134" y="609.5" class="actor-note">records</text>
    </g>

    
    <g>
      <path d="M 350 315 C 395 315, 480 365, 525 365" class="flow" marker-end="url(#arrow)" />
      <text x="437.5" y="331" class="flow-label">manage system</text>
    </g>
    
    <g>
      <path d="M 525 415 C 570 415, 305 485, 350 485" class="flow" marker-end="url(#arrow)" />
      <text x="437.5" y="441" class="flow-label">reports</text>
    </g>
    
    <g>
      <path d="M 875 350 C 920 350, 1005 275, 1050 275" class="flow" marker-end="url(#arrow)" />
      <text x="962.5" y="303.5" class="flow-label">teacher reports</text>
    </g>
    
    <g>
      <path d="M 1050 300 C 1005 300, 920 392, 875 392" class="flow" marker-end="url(#arrow)" />
      <text x="962.5" y="337" class="flow-label">attendance scores</text>
    </g>
    
    <g>
      <path d="M 875 418 C 920 418, 1005 430, 1050 430" class="flow" marker-end="url(#arrow)" />
      <text x="962.5" y="415" class="flow-label">student reports</text>
    </g>
    
    <g>
      <path d="M 1050 585 C 1005 585, 920 445, 875 445" class="flow" marker-end="url(#arrow)" />
      <text x="962.5" y="506" class="flow-label">new students</text>
    </g>
  </g>
</svg>
