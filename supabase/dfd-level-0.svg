      <text x="1290" y="342" class="store-note">users, profiles, roles</text>
    </g>
    
    <g>
      <rect x="1190" y="390" width="275" height="70" rx="16" class="store" />
      <path d="M 1212 410 C 1212 400, 1268 400, 1268 410 V 438 C 1268 448, 1212 448, 1212 438 Z M 1212 410 C 1212 420, 1268 420, 1268 410" class="db-icon" />
      <text x="1290" y="422" class="store-title">D2 Academic Records</text>
      <text x="1290" y="442" class="store-note">students, teachers, classes</text>
    </g>
    
    <g>
      <rect x="1190" y="490" width="275" height="70" rx="16" class="store" />
      <path d="M 1212 510 C 1212 500, 1268 500, 1268 510 V 538 C 1268 548, 1212 548, 1212 538 Z M 1212 510 C 1212 520, 1268 520, 1268 510" class="db-icon" />
      <text x="1290" y="522" class="store-title">D3 Attendance and Scores</text>
      <text x="1290" y="542" class="store-note">attendance, exams, results</text>
    </g>
    
    <g>
      <rect x="1190" y="590" width="275" height="70" rx="16" class="store" />
      <path d="M 1212 610 C 1212 600, 1268 600, 1268 610 V 638 C 1268 648, 1212 648, 1212 638 Z M 1212 610 C 1212 620, 1268 620, 1268 610" class="db-icon" />
      <text x="1290" y="622" class="store-title">D4 Payments</text>
      <text x="1290" y="642" class="store-note">student fee records</text>
    </g>
    
    <g>
      <rect x="1190" y="690" width="275" height="70" rx="16" class="store" />
      <path d="M 1212 710 C 1212 700, 1268 700, 1268 710 V 738 C 1268 748, 1212 748, 1212 738 Z M 1212 710 C 1212 720, 1268 720, 1268 710" class="db-icon" />
      <text x="1290" y="722" class="store-title">D5 Messages</text>
      <text x="1290" y="742" class="store-note">notifications and reminders</text>
    </g>

    
    <g>
      <path d="M 340 345 L 390 331" class="flow" marker-end="url(#arrow)" />
      <text x="365" y="329" class="flow-label">login</text>
    </g>
    
    <g>
      <path d="M 340 485 L 390 461" class="flow" marker-end="url(#arrow)" />
      <text x="365" y="464" class="flow-label">class work</text>
    </g>
    
    <g>
      <path d="M 340 625 C 300 625, 430 721, 390 721" class="flow" marker-end="url(#arrow)" />
      <text x="365" y="664" class="flow-label">view reports</text>
    </g>
    
    <g>
      <path d="M 340 765 L 360 765 C 610 765, 610 591, 740 591" class="flow" marker-end="url(#arrow)" />
      <text x="555" y="790" class="flow-label">payments</text>
    </g>

    
    <g>
      <path d="M 690 331 L 740 331" class="flow" marker-end="url(#arrow)" />
      <text x="715" y="322" class="flow-label">authorized</text>
    </g>
    
    <g>
      <path d="M 690 461 L 740 461" class="flow" marker-end="url(#arrow)" />
      <text x="715" y="452" class="flow-label">classes</text>
    </g>
    
    <g>
      <path d="M 690 591 L 740 591" class="flow" marker-end="url(#arrow)" />
      <text x="715" y="582" class="flow-label">schedule</text>
    </g>
    
    <g>
      <path d="M 690 721 L 740 721" class="flow" marker-end="url(#arrow)" />
      <text x="715" y="712" class="flow-label">reports</text>
    </g>

    
    <g>
      <path d="M 1040 331 L 1190 325" class="flow-soft" marker-end="url(#arrow)" />
      <text x="1115" y="319" class="flow-label">profile data</text>
    </g>
    
    <g>
      <path d="M 1040 461 L 1190 425" class="flow-soft" marker-end="url(#arrow)" />
      <text x="1115" y="434" class="flow-label">academic data</text>
    </g>
    
    <g>
      <path d="M 1040 591 L 1190 625" class="flow-soft" marker-end="url(#arrow)" />
      <text x="1115" y="599" class="flow-label">payment data</text>
    </g>
    
    <g>
      <path d="M 1040 721 L 1190 725" class="flow-soft" marker-end="url(#arrow)" />
      <text x="1115" y="714" class="flow-label">message data</text>
    </g>
  </g>
</svg>
